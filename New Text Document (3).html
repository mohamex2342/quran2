<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger Pro | دمج الفيديوهات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-border:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }
        #progress-container { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-4xl w-full glass p-8 rounded-3xl shadow-2xl border border-white/10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold bg-gradient-to-l from-cyan-400 to-purple-500 bg-clip-text text-transparent mb-2">
                منصة دمج الفيديوهات الاحترافية
            </h1>
            <p class="text-gray-400 text-sm">ادمج نصوصك مع مناظر طبيعية بلمسة سينمائية</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <label class="block text-cyan-400 font-bold">فيديو المنظر الطبيعي</label>
                <input type="file" id="video-input" accept="video/*" 
                       class="w-full bg-black/40 border border-white/20 p-3 rounded-xl text-sm file:bg-cyan-600 file:border-0 file:rounded-lg file:text-white file:px-4 cursor-pointer hover:border-cyan-500 transition-all">
            </div>

            <div class="space-y-3">
                <label class="block text-purple-400 font-bold">فيديو الكلمات (خلفية سوداء)</label>
                <input type="file" id="lyrics-input" accept="video/*" 
                       class="w-full bg-black/40 border border-white/20 p-3 rounded-xl text-sm file:bg-purple-600 file:border-0 file:rounded-lg file:text-white file:px-4 cursor-pointer hover:border-purple-500 transition-all">
            </div>
        </div>

        <div id="progress-container" class="mt-8">
            <div class="flex justify-between mb-2 text-xs">
                <span>جاري المعالجة...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-purple-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div class="mt-10 flex flex-col items-center gap-4">
            <button id="start-btn" 
                    class="px-12 py-4 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-full font-bold text-lg hover:scale-105 active:scale-95 transition-transform shadow-[0_0_20px_rgba(6,182,212,0.3)] disabled:opacity-50 disabled:cursor-not-allowed">
                بدء عملية الدمج
            </button>

            <a id="download-link" class="hidden px-10 py-3 bg-green-600 text-white rounded-xl font-bold animate-bounce shadow-lg shadow-green-900/40">
                تحميل النتيجة النهائية 📥
            </a>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const startBtn = document.getElementById('start-btn');
        const downloadLink = document.getElementById('download-link');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressContainer = document.getElementById('progress-container');

        startBtn.addEventListener('click', async () => {
            const videoFile = document.getElementById('video-input').files[0];
            const lyricsFile = document.getElementById('lyrics-input').files[0];

            if (!videoFile || !lyricsFile) {
                alert('يرجى اختيار الفيديوهين أولاً!');
                return;
            }

            startBtn.disabled = true;
            progressContainer.style.display = 'block';

            // تحميل FFmpeg
            if (!ffmpeg.loaded) {
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
            }

            ffmpeg.on('progress', ({ progress }) => {
                const p = Math.round(progress * 100);
                progressBar.style.width = `${p}%`;
                progressPercent.innerText = `${p}%`;
            });

            // كتابة الملفات
            await ffmpeg.writeFile('main.mp4', await fetchFile(videoFile));
            await ffmpeg.writeFile('text.mp4', await fetchFile(lyricsFile));

            // تنفيذ الدمج الاحترافي
            // استخدام filter_complex لدمج الكلمات عبر نمط 'screen' الذي يزيل الخلفية السوداء
            await ffmpeg.exec([
                '-i', 'main.mp4',
                '-i', 'text.mp4',
                '-filter_complex', '[1:v]format=rgba,colorlevels=rimin=0.05:gimin=0.05:bimin=0.05[l];[0:v][l]blend=all_mode=\'screen\':all_opacity=1',
                '-c:a', 'copy',
                'output.mp4'
            ]);

            // استخراج النتيجة
            const data = await ffmpeg.readFile('output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

            downloadLink.href = url;
            downloadLink.download = 'Final_Video.mp4';
            downloadLink.classList.remove('hidden');
            startBtn.disabled = false;
            startBtn.innerText = 'إعادة المحاولة';
        });
    </script>
</body>
</html>
