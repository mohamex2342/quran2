<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger Pro | Mohamed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1>Video Merger Pro</h1>
            <p>نظام دمج الفيديوهات الاحترافي</p>
        </header>

        <div class="space-y-6">
            <div class="input-group">
                <label>فيديو المنظر الطبيعي</label>
                <input type="text" id="videoLink" placeholder="إلصق رابط الفيديو هنا..." class="link-input">
                <span class="divider">أو ارفع ملفاً محلياً</span>
                <input type="file" id="videoFile" accept="video/*" class="file-input">
            </div>

            <div class="input-group">
                <label>فيديو كلمات تيك توك (خلفية سوداء)</label>
                <input type="text" id="lyricsLink" placeholder="إلصق رابط فيديو التيك توك..." class="link-input">
                <span class="divider">أو ارفع ملفاً محلياً</span>
                <input type="file" id="lyricsFile" accept="video/*" class="file-input">
            </div>
        </div>

        <div id="progressArea" style="display:none;">
            <p id="statusText">جاري المعالجة...</p>
            <div class="progress-bar-bg"><div id="progressBar"></div></div>
        </div>

        <button id="mergeBtn" class="btn-primary">ابدأ عملية الدمج</button>
        <a id="downloadBtn" style="display:none;" class="btn-download pulse">تحميل النتيجة النهائية 📥</a>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
