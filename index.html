<div class="glass-container">
    <header>
        <h1>Video Merger Pro</h1>
        <p>ادمج فيديوهات تيك توك مع مناظر طبيعية</p>
    </header>

    <div class="space-y-6">
        <div class="input-group">
            <label>فيديو المنظر الطبيعي (رابط أو ملف)</label>
            <input type="text" id="videoLink" placeholder="ضع رابط الفيديو هنا..." class="link-input">
            <input type="file" id="videoFile" accept="video/*">
        </div>

        <div class="input-group">
            <label>فيديو كلمات تيك توك (رابط أو ملف)</label>
            <input type="text" id="lyricsLink" placeholder="ضع رابط فيديو التيك توك هنا..." class="link-input">
            <input type="file" id="lyricsFile" accept="video/*">
        </div>
    </div>

    <div id="progressArea" style="display:none;">
        <p id="statusText">جاري المعالجة...</p>
        <div class="progress-bar-bg"><div id="progressBar"></div></div>
    </div>

    <button id="mergeBtn" class="btn-primary">ابدأ الدمج</button>
    <a id="downloadBtn" style="display:none;" class="btn-download">تحميل الفيديو 📥</a>
</div>
