<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger | دمج احترافي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="glass-container max-w-3xl w-full p-8 rounded-3xl border border-white/10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent">
                منصة دمج الفيديوهات
            </h1>
            <p class="text-gray-400 mt-2">دمج نصوص الأغاني مع المناظر الطبيعية باحترافية</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="input-card p-4 rounded-2xl bg-white/5 border border-white/5">
                <label class="block text-cyan-400 mb-2 font-bold">فيديو المنظر الطبيعي</label>
                <input type="file" id="videoInput" accept="video/*" class="file-input">
            </div>

            <div class="input-card p-4 rounded-2xl bg-white/5 border border-white/5">
                <label class="block text-purple-400 mb-2 font-bold">فيديو الكلمات (خلفية سوداء)</label>
                <input type="file" id="lyricsInput" accept="video/*" class="file-input">
            </div>
        </div>

        <div id="progressArea" class="hidden mt-8">
            <div class="flex justify-between mb-2 text-sm">
                <span id="statusText">جاري المعالجة...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-cyan-500 h-full w-0 transition-all"></div>
            </div>
        </div>

        <div class="flex flex-col items-center mt-10 space-y-4">
            <button id="mergeBtn" class="btn-primary">
                ابدأ عملية الدمج
            </button>
            
            <a id="downloadBtn" class="hidden btn-download">
                تحميل الفيديو النهائي 📥
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
