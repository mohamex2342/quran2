<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merger Pro | Mohamed</title>
    <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="glass-container max-w-2xl w-full p-10 rounded-[2rem] border border-white/10 shadow-2xl backdrop-blur-xl bg-white/5">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent">
                Video Merger Pro
            </h1>
            <p class="text-gray-400 mt-3 font-medium">نظام دمج الفيديوهات الاحترافي</p>
        </header>

        <div class="space-y-6">
            <div class="p-6 rounded-2xl bg-white/5 border border-white/5 hover:border-cyan-500/50 transition-all group">
                <label class="block text-cyan-400 mb-3 font-bold">فيديو المنظر الطبيعي</label>
                <input type="file" id="videoInput" accept="video/*" class="w-full text-sm text-slate-400 file:bg-cyan-600 file:border-0 file:rounded-lg file:text-white file:px-4 file:py-2 file:mr-4 file:cursor-pointer hover:file:bg-cyan-500">
            </div>

            <div class="p-6 rounded-2xl bg-white/5 border border-white/5 hover:border-purple-500/50 transition-all group">
                <label class="block text-purple-400 mb-3 font-bold">فيديو الكلمات (خلفية سوداء)</label>
                <input type="file" id="lyricsInput" accept="video/*" class="w-full text-sm text-slate-400 file:bg-purple-600 file:border-0 file:rounded-lg file:text-white file:px-4 file:py-2 file:mr-4 file:cursor-pointer hover:file:bg-purple-500">
            </div>
        </div>

        <div id="progressArea" class="hidden mt-10 space-y-3">
            <div class="flex justify-between text-sm font-bold">
                <span id="statusText" class="text-cyan-400 animate-pulse">جاري التحضير...</span>
                <span id="progressPercent" class="text-white">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[2px]">
                <div id="progressBar" class="bg-gradient-to-r from-cyan-500 to-blue-600 h-full w-0 rounded-full transition-all duration-300 shadow-[0_0_10px_#06b6d4]"></div>
            </div>
        </div>

        <div class="mt-12 flex flex-col items-center gap-5">
            <button id="mergeBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-700 rounded-xl font-extrabold text-lg hover:shadow-[0_0_30px_rgba(6,182,212,0.4)] transform transition active:scale-95 disabled:opacity-50">
                دمج الفيديو الآن
            </button>
            
            <a id="downloadBtn" class="hidden w-full text-center py-4 bg-green-600 rounded-xl font-bold text-white shadow-lg shadow-green-900/20 animate-bounce">
                تحميل النتيجة النهائية 📥
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
